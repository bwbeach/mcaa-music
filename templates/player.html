<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Maui Choral Arts Practice</title>

    <!-- This snippet copied from fonts.google.com -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <!-- <meta name="viewport" content="width=device-width, initial-scale=1.0"> -->
    <title>Now Playing - Maui Choral Arts</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <h1 class="title">Maui Choral Arts</h1>

    <h2>{{ voice_part.pretty_name }}</h2>
    <h3>{{ song.pretty_name }}</h3>
    {% if notes %}
    <p>{{ notes }}</p>
    {% endif %}

    <audio id="audio-player" controls="" src="{{ music_prefix }}{{ song.music_path_name_for_part(voice_part)  }}">
      Your browser does not support the audio element.
    </audio>

    <fieldset class="row">
      <label> <input type="radio" name="action" value="pause" checked="true"> Pause </label>
      <label> <input type="radio" name="action" value="play"> Play </label>
    </fieldset>

    <fieldset class="row">
      <legend>Play Speed</legend>
      <label> <input type="radio" name="speed" value="0.75"> 75% </label>
      <label> <input type="radio" name="speed" value="0.90"> 90% </label>
      <label> <input type="radio" name="speed" value="1.00" checked="true"> 100% </label>
    </fieldset>

    <a href="{{ voice_part.file_name }}.html" id="back-link" class="choice">Back to Songs</a>

    <script>
      const audio = document.getElementById('audio-player');
      const pause = document.querySelector('input[name="action"][value="pause"]');
      const play = document.querySelector('input[name="action"][value="play"]');
      const rates = document.querySelectorAll('input[name="speed"]');

      /* When a play speed is seleceted, change the play speed on the audio element */
      rates.forEach(
	  function(radio) {
              radio.addEventListener('change', function() {
		  const rate = Number(this.value);
		  audio.playbackRate = rate;
              });
	  }
      );

      /* When pause or play is selected, do that to the audio element */
      pause.addEventListener(
	  "change",
	  function() {
	      audio.pause();
	  }
      );
      play.addEventListener(
	  "change",
	  function() {
	      audio.play();
	  }
      );

      /* When the controls on the audio element are used, update our buttons */
      audio.addEventListener(
	  "play",
	  function() {
	      play.checked = true;
	  }
      );
      audio.addEventListener(
	  "pause",
	  function() {
	      pause.checked = true;
	  }
      );
      audio.addEventListener(
	  "ratechange",
	  function() {
	      const newRate = audio.playbackRate;
	      rates.forEach(
		  function(radio) {
		      const buttonRate = Number(radio.value);
		      if (Math.abs(newRate - buttonRate) < 0.01) {
			  radio.checked = true;
		      } else {
			  radio.checked = false;
		      }
		  }
	      );
	  }
      );
    </script>
  </body>
</html>
